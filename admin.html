<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - تمونيات سامي</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background: #f0f2f5; font-family: 'Cairo', sans-serif; }
        .admin-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .admin-header { background: #1e2a3e; color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .basket-card-admin { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .basket-info-admin { flex: 1; min-width: 200px; }
        .basket-actions { display: flex; gap: 10px; }
        input, textarea { padding: 8px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Cairo', sans-serif; width: 100%; margin: 5px 0; }
        .save-btn { background: #2b7a3e; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .delete-btn { background: #e63946; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .add-form { background: white; padding: 20px; border-radius: 15px; margin-top: 20px; }
        .back-link { display: inline-block; margin: 20px; color: #2b7a3e; text-decoration: none; }
        .success-msg { background: #d4edda; color: #155724; padding: 10px; border-radius: 8px; margin: 10px 0; display: none; }
        .loading { text-align: center; padding: 40px; color: #2b7a3e; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للموقع</a>
    
    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-fire"></i> لوحة تحكم Firebase - تمونيات سامي</h1>
            <p>إدارة المنتجات (السلات الغذائية) - التغييرات تحفظ فوراً</p>
        </div>

        <div id="successMsg" class="success-msg"></div>
        <div id="productsList"><div class="loading">جاري التحميل...</div></div>

        <div class="add-form">
            <h3><i class="fas fa-plus-circle"></i> إضافة منتج جديد</h3>
            <input type="text" id="newName" placeholder="اسم المنتج (مثال: سلة العائلة)">
            <textarea id="newDesc" placeholder="وصف المنتج" rows="2"></textarea>
            <input type="number" step="0.01" id="newPrice" placeholder="السعر">
            <button id="addBtn" class="save-btn"><i class="fas fa-save"></i> إضافة المنتج</button>
        </div>
    </div>
 <script type="module" src="js/admin.js"></script>
</body>
</html>
