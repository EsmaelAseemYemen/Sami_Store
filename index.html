    <!-- نافذة طلب السلة -->

    <!-- نافذة طلب مباشر -->
    <div id="directModal" class="modal">
        <div class="modal-content">

            <h3 style="color: #e63946;">طلب مباشر</h3>

                <i class="fas fa-exclamation-triangle"></i> تأكد أن قيمة الطلب 3000 فأكثر لتوصيل الطلب
            </div>
            <textarea id="directOrderDetails" rows="4" placeholder="اكتب تفاصيل طلبك: المواد، الكمية، العنوان، رقم الهاتف..."></textarea>
            <div style="display: flex; gap: 12px; justify-content: center; margin-top: 15px; flex-wrap: wrap;">
                <button id="directWhatsappBtn" class="whatsapp-btn"><i class="fab fa-whatsapp"></i> واتساب</button>
                <button id="directSmsBtn" class="sms-btn"><i class="fas fa-sms"></i> SMS</button>
            </div>
            <button class="close-modal">إغلاق</button>
        </div>
    </div>
    <!-- زر مدير مخفي (يظهر بالضغط على الفوتر 5 مرات مع طلب كلمة مرور) -->
        <script>
            let footerClickCount = 0;
            let clickTimer;
            
            // كلمة المرور (يمكنك تغييرها)
            const ADMIN_PASSWORD = "242S2000";
            
            function checkAdminAccess() {
                footerClickCount++;
                
                // إلغاء المؤقت السابق
                clearTimeout(clickTimer);
                
                // إعادة تعيين العداد بعد ثانيتين إذا لم يصل إلى 5
                clickTimer = setTimeout(() => {
                    footerClickCount = 0;
                }, 2000);
                
                // إذا وصل العداد إلى 5
                if (footerClickCount === 5) {
                    // طلب كلمة المرور
                    const password = prompt('🔐 أدخل كلمة المرور للدخول إلى لوحة التحكم:');
                    
                    if (password === ADMIN_PASSWORD) {
                        window.location.href = 'admin.html';
                    } else if (password !== null) {
                        alert('❌ كلمة المرور غير صحيحة');
                    }
                    
                    // إعادة تعيين العداد بعد المحاولة
                    footerClickCount = 0;
                    clearTimeout(clickTimer);
                }
            }
            
            // إضافة الحدث إلى الفوتر
            document.addEventListener('DOMContentLoaded', () => {
                const footer = document.querySelector('.footer');
                if (footer) {
                    footer.style.cursor = 'pointer';
                    footer.addEventListener('click', checkAdminAccess);
                    
                    // إضافة تلميح صغير (اختياري)
                    footer.title = 'انقر 5 مرات للدخول إلى لوحة الإدارة';
                }
            });
        </script>
        <script>
    function sendEmail() {
        // استبدل your-email@example.com بإيميلك الحقيقي
        const email = "esmaelasid@gmail.com";
        const subject = "اتصال من موقع تمونيات سامي";
        const body = "مرحباً EsmaelAseed،%0A%0Aأود التواصل معك بخصوص الموقع.%0A%0Aالرجاء الرد علي في أقرب وقت.%0A%0Aشكراً لك.";
        
        window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${body}`;
    }
</script>
             <script type="module" src="js/main.js"></script>
